# Gitcord config for Docker: data_dir must be /data (mounted volume).
# Copy to config/config.yaml and set github.org, discord.guild_id, and tokens in .env.

runtime:
  mode: "dry-run"
  log_level: "INFO"
  data_dir: "/data"
  github_adapter: "ghdcbot.adapters.github.rest:GitHubRestAdapter"
  discord_adapter: "ghdcbot.adapters.discord.api:DiscordApiAdapter"
  storage_adapter: "ghdcbot.adapters.storage.sqlite:SqliteStorage"

github:
  org: "example-org"
  token: "${GITHUB_TOKEN}"
  api_base: "https://api.github.com"
  permissions:
    read: true
    write: false
  user_fallback: false

discord:
  guild_id: "000000000000000000"
  token: "${DISCORD_TOKEN}"
  permissions:
    read: true
    write: false
  # Who may run /assign-issue, /issue-requests, /sync (add role_ids from Discord for stable checks).
  # Omit this block to fall back to assignments.issue_assignees for those commands.
  command_permissions:
    assign-issue:
      role_names: ["Mentor"]
      allow_discord_administrators: true
    issue-requests:
      role_names: ["Mentor"]
      allow_discord_administrators: true
    sync:
      role_names: ["Mentor"]
      allow_discord_administrators: true
  activity_channel_id: null
  pr_preview_channels: []

scoring:
  period_days: 30
  weights:
    # Base scoring currently uses merged PR events.
    pr_merged: 5

role_mappings:
  - discord_role: "Contributor"
    min_score: 10
  - discord_role: "Maintainer"
    min_score: 40

assignments:
  review_roles:
    - "Maintainer"
  # Fallback if discord.command_permissions is omitted; also used for org issue assignment planning.
  issue_assignees:
    - "Mentor"
  issue_request_eligible_roles: []

repo_contributor_roles: {}

identity_mappings: []
