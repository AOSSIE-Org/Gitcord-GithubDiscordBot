# Gitcord config for Aussie organization (AOSSIE-Org).
# Set GITHUB_TOKEN and DISCORD_TOKEN in .env, or replace the token values below.
# For Docker: set data_dir to "/data" and use: docker compose run --rm bot --config /app/config/aussie.yaml bot

runtime:
  mode: "active"
  log_level: "INFO"
  data_dir: "/data"
  github_adapter: "ghdcbot.adapters.github.rest:GitHubRestAdapter"
  discord_adapter: "ghdcbot.adapters.discord.api:DiscordApiAdapter"
  storage_adapter: "ghdcbot.adapters.storage.sqlite:SqliteStorage"
  # Notifications still run; these only skip score computation and Discord role add/remove.
  enable_scoring: false
  enable_discord_role_updates: false

github:
  org: "AOSSIE-Org"
  token: "${GITHUB_TOKEN}"
  api_base: "https://api.github.com"
  permissions:
    read: true
    write: true
  user_fallback: false
  # Repo allowlist: only these repositories are scanned (sync/run-once). Uses short repo names under the org (not "org/name").
  # Omit this block entirely to include all org repos (slower on large orgs). mode "deny" excludes listed names instead.
  repos:
    mode: allow
    names:
      - "Gitcord-GithubDiscordBot"
      # Add more repos as needed, e.g.:
      # - "another-repo"

discord:
  guild_id: "1022871757289422898"
  token: "${DISCORD_TOKEN}"
  permissions:
    read: true
    write: true
  # TESTING: set false in production — when true, any server member may use /assign-issue, /issue-requests, /sync.
  unrestricted_slash_commands: true
  # Per-command slash access (role_ids stable; role_names optional). Admins may use these when enabled below.
  command_permissions:
    assign-issue:
      role_names: ["Mentor"]
      allow_discord_administrators: true
    issue-requests:
      role_names: ["Mentor"]
      allow_discord_administrators: true
    sync:
      role_names: ["Mentor"]
      allow_discord_administrators: true
  activity_channel_id: null
  pr_preview_channels: []
  # Verified GitHub → Discord DMs (or channel if channel_id is set). Requires linked users (/link + /verify-link).
  notifications:
    enabled: true
    issue_assignment: true
    pr_review_requested: true
    pr_review_result: true
    pr_merged: true
    coderabbit_reminders: false
    coderabbit_reminder_after_hours: 48
    channel_id: null  # null = DM; set to a channel ID to post there instead

scoring:
  period_days: 30
  weights:
    issue_opened: 3
    pr_opened: 5
    pr_reviewed: 2
    comment: 1

role_mappings:
  - discord_role: "Contributor"
    min_score: 10
  - discord_role: "Maintainer"
    min_score: 40

assignments:
  review_roles:
    - "Maintainer"
  issue_assignees:
    - "Mentor"
  issue_request_eligible_roles: []

repo_contributor_roles: {}

